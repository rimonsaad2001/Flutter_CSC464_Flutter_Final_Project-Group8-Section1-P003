name: shopping_app
description: A Flutter ecommerce project with Firebase backend
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (Firestore-only)
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  # Navigation
  go_router: ^13.2.0

  # State management
  provider: ^6.1.2

  # Image handling (URL + base64)
  cached_network_image: ^3.3.1

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true